version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: astronlp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: astronlp_user
      POSTGRES_PASSWORD: astronlp_password
      POSTGRES_DB: astronlp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  redis:
    image: redis:7-alpine
    container_name: astronlp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: astronlp-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  nats:
    image: nats:latest
    container_name: astronlp-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: always

  minio:
    image: minio/minio:latest
    container_name: astronlp-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
